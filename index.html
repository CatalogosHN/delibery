<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Cómo llegar a la bodega</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f5f8;
  color:#111;
}
.wrap{
  max-width:520px;
  margin:auto;
  padding:14px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 24px #0001;
}
h1{
  font-size:21px;
  margin:0 0 8px;
}
p{
  margin:0 0 12px;
  color:#555;
  font-size:15px;
  line-height:1.4;
}
.video{
  width:100%;
  aspect-ratio:16/9;
  border:0;
  border-radius:14px;
  background:#000;
}
.btn{
  display:block;
  margin-top:12px;
  padding:14px;
  border-radius:12px;
  background:#0b74ff;
  color:white;
  text-align:center;
  font-weight:bold;
  text-decoration:none;
}
.note{
  font-size:13px;
  color:#777;
  margin-top:12px;
}
</style>
</head>
<body oncontextmenu="return false">
<div class="wrap">
  <div class="card">
    <h1>Video para llegar</h1>
    <p>Mira el video completo antes de llegar para evitar perderte.</p>

    <iframe
      class="video"
      loading="lazy"
      allow="fullscreen"
      src="https://drive.google.com/file/d/1ImjY-orw-2ItEN2iBs9p15MTeOTrIO5L/view?usp=drivesdk">
    </iframe>

    <a class="btn" href="https://maps.app.goo.gl/hoVzTguSpfQJg3tw8" target="_blank" rel="noopener">
      Abrir ubicación en Google Maps
    </a>

    <div class="note">
      Este video es solo para guía de llegada.
    </div>
  </div>
</div>
</body>
</html>
